name: $(majorVersion).$(minorVersion).$(patchVersion).$(Rev:r)

variables:
  - name: majorVersion
    value: 1
  - name: minorVersion
    value: 1
  - name: patchVersion
    value: 1
    
parameters:
  - name: previewVersion
    type: boolean
    default: false
    
resources:
   repositories:
   - repository: templates
     type: git
     name: Templates/Pipelines.NugetPublisher

pool:
  vmImage: ubuntu-latest

extends:
  template: nuget-publisher.yml@templates
  parameters:
    publishProject: '**/ImprovedConsole.csproj'
    testProject: '**/ImprovedConsole.Tests.csproj'
    majorVersion: ${{ variables.majorVersion }}
    minorVersion: ${{ variables.minorVersion }}
    patchVersion: ${{ variables.patchVersion }}
    previewVersion: ${{ parameters.previewVersion }}
    environment: push-nuget

